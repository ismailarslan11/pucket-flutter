# Render.com deploy: Dashboard > New > Blueprint > bu repo server/ klasörü
services:
  - type: web
    name: pucket-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RECONNECT_GRACE_MS
        value: "60000"
