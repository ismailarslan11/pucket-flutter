# Render.com deploy: Dashboard > New > Blueprint > bu repo server/ klasörü
databases:
  - name: pucket-db
    databaseName: pucket
    user: pucket
    plan: free

services:
  - type: web
    name: pucket-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RECONNECT_GRACE_MS
        value: "60000"
      - key: DATABASE_URL
        fromDatabase:
          name: pucket-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
